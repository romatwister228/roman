<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Задание 4</title>
</head>

<body>
    <h1>Поиск игрока</h1>

    <form id="search-form">
        <input type="text" id="steam-id" placeholder="Введи Steam ID">
        <button type="submit">Найти</button>
    </form>

    <p id="result"></p>

    <script>
        const form = document.querySelector('#search-form');

        form.addEventListener('submit', (e) => {
            e.preventDefault();

            const input = document.querySelector('#steam-id');
            const steamId = input.value;

            document.querySelector('#result').textContent = `Ищем игрока: ${steamId}`;
        });
    </script>
</body>

</html>
