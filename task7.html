<!DOCTYPE html>
<html lang="ru">

<head>
    <title>Dota 2 Heroes — Поиск</title>
</head>

<body>
    <h1>Герои Dota 2</h1>
    <input type="text" id="search" placeholder="Поиск героя...">
    <div id="heroes-list"></div>

    <script>
        let allHeroes = [];

        async function loadHeroes() {
            const response = await fetch('https://api.opendota.com/api/heroes');
            allHeroes = await response.json();

            renderHeroes(allHeroes);
        }

        function renderHeroes(heroes) {
            const list = document.getElementById('heroes-list');
            list.innerHTML = '';

            heroes.forEach(hero => {
                const div = document.createElement('div');
                div.textContent = hero.localized_name;
                list.appendChild(div);
            });
        }

        document.getElementById('search').addEventListener('input', function () {
            const query = this.value.toLowerCase();
            const filtered = allHeroes.filter(hero =>
                hero.localized_name.toLowerCase().includes(query)
            );
            renderHeroes(filtered)
        });

        loadHeroes();
    </script>
</body>

</html>
